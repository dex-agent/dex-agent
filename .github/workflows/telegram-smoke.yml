name: Telegram Smoke

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_EXPECTED_USERNAME: ${{ secrets.TELEGRAM_EXPECTED_USERNAME }}
      TELEGRAM_SMOKE_CHAT_ID: ${{ secrets.TELEGRAM_SMOKE_CHAT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Skip Telegram smoke without token
        if: ${{ env.BOT_TOKEN == '' }}
        run: echo "TELEGRAM_BOT_TOKEN is not configured; skipping live Telegram smoke check."

      - name: Telegram getMe smoke check
        if: ${{ env.BOT_TOKEN != '' }}
        run: npm run telegram:smoke
